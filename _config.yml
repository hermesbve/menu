# Jekyll Configuration for menu.f2p.be
# No remote theme — the page has its own HTML/CSS

# Site settings
title: "Menu"
description: "Digital menu"
url: "https://menu.f2p.be"
baseurl: ""

# Build settings
markdown: kramdown

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/

# Plugins
plugins:
  - jekyll-include-cache
  - jekyll-data


# Cart settings
cart_title: "Shopping Cart"
empty_cart_text: "Your cart is empty"
