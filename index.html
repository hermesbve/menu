<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Menu</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg: #0f0f0f;
      --bg-card: #181818;
      --bg-hover: #232323;
      --text: #e0e0e0;
      --text-muted: #8a8a8a;
      --text-heading: #f0f0f0;
      --border: #2a2a2a;
      --accent: #b0b0b0;
      --green: #22c55e;
      --red: #ef4444;
      --radius: 14px;
      --radius-sm: 10px;
      --header-h: 52px;
      --tabs-h: 64px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body { display: flex; flex-direction: column; }

    /* ─── Top Bar ─── */
    .top-bar {
      position: fixed; top:0; left:0; right:0; z-index:100;
      height: var(--header-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }
    .top-bar .logo { font-size: 1.15rem; font-weight: 700; color: var(--text-heading); }
    .cart-btn {
      position: relative;
      background: none; border: none; color: var(--text);
      font-size: 1.4rem; cursor: pointer; padding: 6px;
      display: flex; align-items: center;
    }
    .cart-badge {
      position: absolute; top: 0; right: -2px;
      background: var(--green); color: #000;
      font-size: 0.6rem; font-weight: 700;
      min-width: 18px; height: 18px;
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      padding: 0 4px; transform: scale(0); transition: transform 0.2s ease;
    }
    .cart-badge.show { transform: scale(1); }

    /* ─── Section Tabs ─── */
    .tabs-wrap {
      position: fixed; top: var(--header-h); left:0; right:0; z-index:99;
      height: var(--tabs-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      overflow-x: auto; overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .tabs { display: flex; gap: 6px; padding: 10px 16px; white-space: nowrap; }
    .tab-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-muted); font-size: 0.78rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    }
    .tab-btn i { font-size: 1.05rem; }
    .tab-btn.active { background: var(--text-heading); color: #000; border-color: var(--text-heading); }
    .tab-btn:hover:not(.active) { background: var(--bg-hover); color: var(--text); }

    /* ─── Content Area ─── */
    .content {
      margin-top: calc(var(--header-h) + var(--tabs-h));
      padding: 16px 16px 100px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .section-title {
      font-size: 1.05rem; font-weight: 700; color: var(--text-heading);
      margin: 24px 0 12px; display: flex; align-items: center; gap: 8px;
    }
    .section-title i { color: var(--text-muted); font-size: 1.15rem; }
    .section-title:first-child { margin-top: 0; }

    /* ─── Item Card ─── */
    .item-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
    }
    .item-card.disabled { opacity: 0.35; pointer-events: none; }
    .item-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: var(--radius-sm);
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: var(--text-muted);
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 0.88rem; font-weight: 600; color: var(--text-heading);
      display: flex; align-items: center; gap: 6px;
    }
    .item-price { color: var(--text-muted); font-weight: 400; font-size: 0.8rem; }
    .item-desc { font-size: 0.73rem; color: var(--text-muted); margin-top: 2px; line-height: 1.3; }
    .item-actions {
      display: flex; align-items: center; gap: 0;
      flex-shrink: 0;
    }
    .item-actions button {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .item-actions .qty-minus { color: var(--red); }
    .item-actions .qty-plus { color: var(--green); }
    .item-actions button:active { transform: scale(0.9); }
    .item-actions .qty {
      min-width: 32px; text-align: center;
      font-size: 0.9rem; font-weight: 600; color: var(--text-heading);
    }

    /* ─── Cart Drawer ─── */
    .cart-overlay {
      position: fixed; inset:0; z-index:200;
      background: rgba(0,0,0,0.6);
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .cart-overlay.open { opacity: 1; pointer-events: auto; }

    .cart-drawer {
      position: fixed; top: calc(var(--header-h) + var(--tabs-h)); left:0; right:0; bottom:0; z-index:201;
      overflow-y: auto;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .cart-drawer.open { opacity: 1; pointer-events: auto; }

    .cart-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 0 auto 16px;
    }
    .cart-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .cart-header h2 { font-size: 1.1rem; font-weight: 700; color: var(--text-heading); }
    .cart-total {
      font-size: 1.2rem; font-weight: 700; color: var(--green);
    }
    .cart-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.4rem; cursor: pointer; padding: 4px;
    }

    .cart-empty {
      text-align: center; padding: 48px 16px;
      color: var(--text-muted); font-size: 0.95rem;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .cart-empty i { font-size: 2.5rem; }

    .cart-section-title {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted);
      margin: 16px 0 8px; padding-left: 2px;
    }
    .cart-section-title:first-of-type { margin-top: 0; }

    .cart-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
    }
    .cart-item .item-info { flex:1; }
    .cart-item .item-name { font-size: 0.82rem; }
    .cart-item .item-actions button {
      width: 28px; height: 28px; font-size: 0.95rem;
    }
    .cart-item .qty { min-width: 24px; font-size: 0.85rem; }
    .cart-subtotal { font-size: 0.78rem; color: var(--text-muted); min-width: 40px; text-align: right; }

    @media (min-width: 600px) {
      .content { max-width: 520px; margin-left: auto; margin-right: auto; }
      .cart-drawer { max-width: 520px; left:50%; right:auto; transform: translateX(-50%); }
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <header class="top-bar">
    <span class="logo">menu</span>
    <button class="cart-btn" id="cartBtn" aria-label="Shopping cart">
      <i class="fa-solid fa-cart-shopping"></i>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </header>

  <!-- Section Tabs -->
  <div class="tabs-wrap" id="tabsWrap">
    <div class="tabs" id="tabs"></div>
  </div>

  <!-- Content -->
  <main class="content" id="content"></main>

  <!-- Cart Overlay -->
  <div class="cart-overlay" id="cartOverlay"></div>

  <!-- Cart Drawer -->
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-handle"></div>
    <div class="cart-header">
      <h2>{{ site.cart_title | default: "Shopping Cart" }}</h2>
      <button class="cart-close" id="cartClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="cart-total" id="cartTotal">€0.00</div>
    <div id="cartItems"></div>
  </div>

  <script>
    // ── Menu Data (from _data/menu.yml) ──────────────────────────
    const menuSections = {{ site.data.menu.sections | jsonify }};
    const emptyCartText = {{ site.empty_cart_text | default: "Your cart is empty" | jsonify }};

    // ── Filter out disabled sections & items ───────────────────────
    const activeSections = menuSections
      .filter(s => !s.disabled)
      .map(s => ({
        ...s,
        items: s.items.filter(i => !i.disabled)
      }));

    // ── State ──────────────────────────────────────────────────────
    const cart = {}; // { itemKey: { name, price, qty, sectionId, sectionName, icon } }

    // ── Render Helpers ─────────────────────────────────────────────
    function getItemKey(sectionId, itemName) { return sectionId + '::' + itemName; }
    function itemIcon(item, section) { return item.icon || section.icon; }

    function renderTabs() {
      const el = document.getElementById('tabs');
      el.innerHTML = activeSections.map(s =>
        `<button class="tab-btn" data-section="${s.id}" onclick="scrollToSection('${s.id}')">
          <i class="${s.icon}"></i> ${s.section}
        </button>`
      ).join('');
    }

    function renderContent() {
      const el = document.getElementById('content');
      el.innerHTML = activeSections.map(s => `
        <div class="section-title" id="sec-${s.id}"><i class="${s.icon}"></i> ${s.section} </div>
        ${s.items.map(item => {
          const key = getItemKey(s.id, item.name);
          const icon = itemIcon(item, s);
          const qty = cart[key] ? cart[key].qty : 0;
          return `
            <div class="item-card" data-key="${key}" onclick="adjust('${key}',1)">
              <div class="item-icon"><i class="${icon}"></i></div>
              <div class="item-info">
                <div class="item-name">${item.name} <span class="item-price">€${item.price.toFixed(2)}</span></div>
                <div class="item-desc">${item.description || ''}</div>
              </div>
              <div class="item-actions">
                <button class="qty-minus" onclick="event.stopPropagation();adjust('${key}',-1)"><i class="fa-solid fa-minus"></i></button>
                <span class="qty" id="qty-${CSS.escape(key.replace(/::/g,'-'))}">${qty}</span>
                <button class="qty-plus" onclick="event.stopPropagation();adjust('${key}',1)"><i class="fa-solid fa-plus"></i></button>
              </div>
            </div>
          `;
        }).join('')}
      `).join('');
    }

    function renderCart() {
      const itemsEl = document.getElementById('cartItems');
      const totalEl = document.getElementById('cartTotal');
      const entries = Object.entries(cart).filter(([_, v]) => v.qty > 0);

      if (entries.length === 0) {
        itemsEl.innerHTML = `<div class="cart-empty"><i class="fa-solid fa-cart-shopping"></i>${emptyCartText}</div>`;
        totalEl.textContent = '€0.00';
        updateBadge();
        return;
      }

      let total = 0;
      let html = '';
      for (const menuSec of activeSections) {
        const secItems = entries
          .filter(([_, v]) => v.sectionId === menuSec.id)
          .map(([key, v]) => ({ key, ...v }));
        if (secItems.length === 0) continue;
        secItems.sort((a, b) => a.name.localeCompare(b.name));
        const itemCount = secItems.reduce((s, i) => s + i.qty, 0);
        html += `<div class="cart-section-title">${menuSec.section} (${itemCount})</div>`;
        secItems.forEach(item => {
          total += item.price * item.qty;
          html += `
            <div class="cart-item" data-key="${item.key}" onclick="adjust('${item.key}',1)">
              <div class="item-icon" style="width:32px;height:32px;font-size:0.95rem"><i class="${item.icon}"></i></div>
              <div class="item-info">
                <div class="item-name">${item.name}</div>
                <div class="item-price" style="font-size:0.73rem">€${item.price.toFixed(2)}</div>
              </div>
              <div class="item-actions">
                <button class="qty-minus" onclick="event.stopPropagation();adjust('${item.key}',-1)"><i class="fa-solid fa-minus"></i></button>
                <span class="qty">${item.qty}</span>
                <button class="qty-plus" onclick="event.stopPropagation();adjust('${item.key}',1)"><i class="fa-solid fa-plus"></i></button>
              </div>
              <div class="cart-subtotal">€${(item.price * item.qty).toFixed(2)}</div>
            </div>
          `;
        });
      }
      itemsEl.innerHTML = html;
      totalEl.textContent = `€${total.toFixed(2)}`;
      updateBadge();
    }

    function updateBadge() {
      const total = Object.values(cart).reduce((sum, v) => sum + v.qty, 0);
      const badge = document.getElementById('cartBadge');
      badge.textContent = total;
      badge.classList.toggle('show', total > 0);
    }

    // ── Actions ────────────────────────────────────────────────────
    function adjust(key, delta) {
      const parts = key.split('::');
      const sectionId = parts[0];
      const itemName = parts.slice(1).join('::');
      const section = activeSections.find(s => s.id === sectionId);
      const item = section.items.find(i => i.name === itemName);

      if (!cart[key]) {
        cart[key] = {
          name: item.name,
          price: item.price,
          qty: 0,
          sectionId: section.id,
          sectionName: section.section,
          icon: itemIcon(item, section)
        };
      }
      cart[key].qty = Math.max(0, cart[key].qty + delta);
      if (cart[key].qty === 0) delete cart[key];

      // Update inline counters in content
      const safeKey = CSS.escape(key.replace(/::/g, '-'));
      const qtyEl = document.getElementById('qty-' + safeKey);
      if (qtyEl) qtyEl.textContent = cart[key] ? cart[key].qty : 0;

      renderCart();
    }

    function scrollTabIntoView(id) {
      const btn = document.querySelector(`.tab-btn[data-section="${id}"]`);
      if (btn) btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    function scrollToSection(id) {
      const el = document.getElementById('sec-' + id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.section === id));
      scrollTabIntoView(id);
    }

    // ── Cart drawer ────────────────────────────────────────────────
    function openCart() {
      document.getElementById('cartOverlay').classList.add('open');
      document.getElementById('cartDrawer').classList.add('open');
      renderCart();
    }
    function closeCart() {
      document.getElementById('cartOverlay').classList.remove('open');
      document.getElementById('cartDrawer').classList.remove('open');
    }

    document.getElementById('cartBtn').addEventListener('click', openCart);
    document.getElementById('cartOverlay').addEventListener('click', closeCart);
    document.getElementById('cartClose').addEventListener('click', closeCart);

    // ── Intersection Observer for tab highlighting ────────────────
    function setupObserver() {
      const options = { rootMargin: '-80px 0px -40% 0px', threshold: 0 };
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id.replace('sec-', '');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.section === id));
            scrollTabIntoView(id);
          }
        });
      }, options);
      activeSections.forEach(s => {
        const el = document.getElementById('sec-' + s.id);
        if (el) observer.observe(el);
      });
    }

    // ── Init ───────────────────────────────────────────────────────
    renderTabs();
    renderContent();
    updateBadge();
    setupObserver();

    // Usage: set disabled: true on a section or item to hide it.
    // Sections with disabled: true are fully excluded (no tab, no content).
    // Items with disabled: true are excluded from their section.
    // Examples:
    //   { section: "Spirits", disabled: true, ... }     ← hides entire section
    //   { name: "Duvel", disabled: true, ... }          ← hides single item
  </script>
</body>
</html>
